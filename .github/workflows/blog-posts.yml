name: Latest blog posts

on:
  schedule:
    - cron: "0 6 * * *"   # daily at 06:00 UTC
  workflow_dispatch:        # adds a manual "Run workflow" button for instant testing

permissions:
  contents: write           # lets the action commit the updated README

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull latest posts
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          # CONFIRM THIS URL. Open it in a browser - if you get XML, it works.
          # If olegkoval.com has no feed yet, swap in the Substack feed below
          # (guaranteed to work): https://olko.substack.com/feed
          feed_list: "https://www.olegkoval.com/feed.xml"
          max_post_count: 5
          commit_message: "chore: refresh latest blog posts"
